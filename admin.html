<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONSTRUGLOBAL - Panel Administrativo</title>
    <style>
        body { background-color: #0f172a; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; }
        .header-admin { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #d97706; padding-bottom: 10px; margin-bottom: 20px; }
        .header-admin h1 { color: #ffffff; margin: 0; }
        .header-admin h1 span { color: #d97706; }
        .btn-cerrar { background-color: #ef4444; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .grid-metricas { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
        .card-metrica { background-color: #1e293b; padding: 20px; border-radius: 8px; border-left: 4px solid #d97706; text-align: center; }
        .card-metrica h3 { margin: 0; font-size: 1rem; color: #94a3b8; }
        .card-metrica p { margin: 10px 0 0 0; font-size: 2rem; font-weight: bold; }
        #adm-ganancias { color: #00e640; }
        #adm-items-count { color: #38bdf8; }
        .main-content { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; margin-bottom: 20px; }
        .seccion-panel { background-color: #1e293b; padding: 20px; border-radius: 8px; }
        .seccion-panel h2 { color: #d97706; margin-top: 0; font-size: 1.3rem; }
        .btn-registrar { background-color: #d97706; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 15px; }
        .tabla-contenedor { max-height: 400px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 12px; border-bottom: 1px solid #334155; }
        th { color: #d97706; text-transform: uppercase; font-size: 0.85rem; }
        .badge { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.75rem; }
        .badge-success { background-color: #10b981; color: white; }
        .badge-danger { background-color: #ef4444; color: white; }
        .seccion-historial { background-color: #1e293b; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .seccion-historial h2 { color: #38bdf8; margin-top: 0; }
    </style>
</head>
<body>

    <div class="header-admin">
        <h1>PANEL <span>ADMINISTRATIVO</span></h1>
        <button class="btn-cerrar" onclick="cerrarSesion()">Cerrar Sesión</button>
    </div>

    <div class="grid-metricas">
        <div class="card-metrica">
            <h3>Ingresos Totales</h3>
            <p id="adm-ganancias">$0.00</p>
        </div>
        <div class="card-metrica">
            <h3>Pedidos Procesados</h3>
            <p id="adm-ventas-count">0</p>
        </div>
        <div class="card-metrica">
            <h3>Artículos en Catálogo</h3>
            <p id="adm-items-count">0</p>
        </div>
    </div>

    <div class="main-content">
        <div class="seccion-panel">
            <h2>Gestión de Catálogo e Inventario</h2>
            <button class="btn-registrar" onclick="modalAgregarMaterial()">+ Registrar Nuevo Material</button>
            <div class="tabla-contenedor">
                <table>
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Material</th>
                            <th>Precio</th>
                            <th>Estado</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-inventario-admin">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="seccion-panel">
            <h2>Rendimiento de Ventas Histórico</h2>
            <div style="position: relative; height: 320px; width: 100%;">
                <canvas id="graficaVentas"></canvas>
            </div>
        </div>
    </div>

    <div class="seccion-historial">
        <h2>Historial de Órdenes Recibidas</h2>
        <table>
            <thead>
                <tr>
                    <th>Folio</th>
                    <th>Fecha/Hora</th>
                    <th>Cliente</th>
                    <th>Dirección Entrega</th>
                    <th>Monto Total</th>
                </tr>
            </thead>
            <tbody id="tabla-ventas-historial">
                </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="sistema-logica.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Este comando limpia la memoria residual vieja del navegador de forma automática 
            // solo si nota que el inventario se quedó con errores de propiedades anteriores.
            if(localStorage.getItem("inventario_materiales") && !localStorage.getItem("inventario_materiales").includes('"img"')) {
                localStorage.clear();
            }
            
            // Inicializar el cuadro de mandos
            inicializarPanelAdmin();
        });
    </script>
</body>
</html>
