<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConstruGlobal - Ticket de Venta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body {
            background-color: #0f172a; /* Fondo idéntico al panel admin y tienda */
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .ticket-card {
            background-color: #1e293b;
            border-top: 4px solid #d97706; /* Línea naranja corporativa superior */
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
    </style>
</head>
<body onload="generarTicket()" class="min-h-screen flex items-center justify-center p-4">

    <div class="ticket-card w-full max-w-md rounded-2xl p-6 space-y-6">
        
        <div class="text-center">
            <span class="text-xl font-black tracking-wider text-white">CONSTRU<span class="text-amber-500">GLOBAL</span></span>
            <p class="text-slate-400 text-xs mt-1">Suministros y Materiales de Alta Resistencia</p>
        </div>

        <div class="border-t border-dashed border-slate-700 my-2"></div>

        <div class="grid grid-cols-2 text-xs gap-y-2 text-slate-400">
            <div>Folio: <span id="folio-ticket" class="text-sky-400 font-bold">Generando...</span></div>
            <div class="text-right">Fecha: <span id="fecha-ticket" class="text-slate-300">--/--/----</span></div>
            <div>Atendió: <span class="text-slate-300">Sistema Web Ventas</span></div>
            <div class="text-right">Estado: <span class="text-emerald-400 font-semibold">Aprobado ✓</span></div>
        </div>

        <div class="bg-slate-50 text-slate-900 rounded-xl p-4 text-xs space-y-1.5 shadow-inner">
            <h3 class="font-bold text-slate-500 uppercase tracking-wider text-[10px] mb-1">Datos de Entrega / Facturación</h3>
            <div><strong>Cliente:</strong> <span id="ticket-cliente">Cargando...</span></div>
            <div><strong>Dirección:</strong> <span id="ticket-direccion">Cargando...</span></div>
        </div>

        <div class="space-y-2">
            <div class="flex justify-between text-xs font-bold text-amber-500 uppercase tracking-wider pb-2 border-b border-slate-700">
                <span>Material</span>
                <span>Total</span>
            </div>
            
            <table class="w-full text-xs text-slate-300">
                <tbody id="tabla-cuerpo-ticket" class="divide-y divide-slate-800/50">
                    <tr>
                        <td colspan="2" class="text-center py-4 text-slate-500">Procesando lista de materiales...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="border-t border-dashed border-slate-700 my-2"></div>

        <div class="flex justify-between items-center">
            <span class="text-sm font-bold text-slate-300">Total Pago:</span>
            <span id="total-monto-ticket" class="text-2xl font-black text-emerald-400">$0.00</span>
        </div>

        <div class="grid grid-cols-2 gap-3 pt-2">
            <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-2.5 px-4 rounded-lg transition flex items-center justify-center space-x-1.5 shadow-md">
                <i data-lucide="printer" class="w-4 h-4"></i>
                <span>Imprimir / PDF</span>
            </button>
            <button onclick="enviarCorreoSimulado()" class="bg-amber-600 hover:bg-amber-700 text-white text-xs font-bold py-2.5 px-4 rounded-lg transition flex items-center justify-center space-x-1.5 shadow-md">
                <i data-lucide="mail" class="w-4 h-4"></i>
                <span>Enviar Correo</span>
            </button>
        </div>

        <button onclick="vaciarYRegresar()" class="w-full bg-slate-100 hover:bg-white text-slate-900 font-bold py-3 px-4 rounded-xl transition flex items-center justify-center space-x-2 shadow-md">
            <i data-lucide="log-out" class="w-5 h-5 text-slate-700"></i>
            <span>Terminar y Regresar al Catálogo</span>
        </button>

    </div>

    <script>
        lucide.createIcons();
    </script>

    <script>
        function generarTicket() {
            const orden = JSON.parse(localStorage.getItem("ultima_orden"));
            if (!orden) return;

            // Inyección de Meta-datos
            if(document.getElementById("folio-ticket")) document.getElementById("folio-ticket").innerText = orden.folio;
            if(document.getElementById("fecha-ticket")) document.getElementById("fecha-ticket").innerText = orden.fecha;
            if(document.getElementById("total-monto-ticket")) document.getElementById("total-monto-ticket").innerText = `$${orden.total.toFixed(2)}`;
            
            // Inyección de Datos del Formulario
            if(document.getElementById("ticket-cliente")) document.getElementById("ticket-cliente").innerText = orden.cliente;
            if(document.getElementById("ticket-direccion")) document.getElementById("ticket-direccion").innerText = orden.direccion;

            // Inyección de las filas de la tabla de artículos
            const cuerpoTabla = document.getElementById("tabla-cuerpo-ticket");
            if (!cuerpoTabla) return;
            cuerpoTabla.innerHTML = "";

            orden.items.forEach(item => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td class="py-2 text-slate-300">${item.nombre} <span class="text-slate-500 font-semibold">x${item.cantidad}</span></td>
                    <td class="py-2 text-right font-bold text-white">$${(item.precio * item.cantidad).toFixed(2)}</td>
                `;
                cuerpoTabla.appendChild(tr);
            });
        }

        // ✨ Función con SweetAlert2 para la alerta del correo
        function enviarCorreoSimulado() {
            Swal.fire({
                title: '<span style="color: #ffffff;">¡Ticket Enviado!</span>',
                html: '<p style="color: #94a3b8; font-size: 0.95rem;">Se ha enviado el desglose del presupuesto correctamente al correo electrónico del cliente.</p>',
                icon: 'success',
                iconColor: '#d97706', // El naranja de tus acentos del panel
                background: '#1e293b', // Fondo azul pizarra a juego
                confirmButtonColor: '#d97706',
                confirmButtonText: 'Entendido',
                customClass: {
                    popup: 'border border-slate-700 rounded-2xl shadow-xl'
                }
            });
        }

        function vaciarYRegresar() {
            // Borra de la memoria los artículos de la compra que acaba de finalizar para dejar el carrito en (0)
            localStorage.removeItem("carrito_constru");
            // Redirige de inmediato a la interfaz del catálogo renovado
            window.location.href = "tienda.html";
        }
    </script>
</body>
</html>
