<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprobante de Compra | ConstruGlobal</title>
    <link rel="stylesheet" href="estilos-base.css">
    <style>
        /* Fondo degradado corporativo exclusivo de pantalla */
        .ticket-body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%) !important;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ticket-box {
            background: #ffffff;
            max-width: 500px;
            width: 90%;
            margin: 30px auto;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            border-top: 8px solid #d97706;
        }

        .ticket-header { text-align: center; border-bottom: 2px dashed #cbd5e1; padding-bottom: 15px; margin-bottom: 20px; }
        .ticket-meta { display: flex; justify-content: space-between; font-size: 0.9rem; color: #64748b; margin-bottom: 8px; }
        .ticket-meta span strong { color: #334155; }

        .ticket-total { 
            text-align: right; 
            font-size: 1.7rem; 
            font-weight: bold; 
            margin-top: 20px; 
            padding-top: 15px; 
            border-top: 2px dashed #cbd5e1; 
            color: #1e3a8a; 
        }
        
        .ticket-actions { display: flex; gap: 15px; margin-top: 30px; }
        .btn-print { background: #1e3a8a; color: white; border: none; padding: 14px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; }
        .btn-print:hover { background: #1e40af; }
        .btn-return { background: #e2e8f0; color: #0f172a; border: none; padding: 14px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; text-align: center; text-decoration: none; font-size: 1rem; transition: 0.2s; }
        .btn-return:hover { background: #cbd5e1; }
        
        /* Configuración de Impresión Física / PDF */
        @media print { 
            .ticket-actions { display: none; } 
            .ticket-box { box-shadow: none; margin: 0 auto; max-width: 100%; padding: 0; border-top: none; } 
            .ticket-body { background: white !important; }
        }
    </style>
</head>
<body class="ticket-body" onload="generarTicket()">

    <div class="ticket-box">
        <div class="ticket-header">
            <h2 style="color: #0f172a; font-size: 1.6rem; letter-spacing: 0.5px;">CONSTRU<span style="color:#d97706;">GLOBAL</span></h2>
            <p style="color: #64748b; font-size: 0.85rem; margin-top: 3px;">Suministros y Materiales de Alta Resistencia</p>
        </div>

        <div class="ticket-meta">
            <span><strong>Folio:</strong> <span id="folio-ticket">CG-000000</span></span>
            <span><strong>Fecha:</strong> <span id="fecha-ticket">--/--/----</span></span>
        </div>
        <div class="ticket-meta" style="margin-bottom: 20px;">
            <span><strong>Atendió:</strong> Sistema Web Ventas</span>
            <span><strong>Estado:</strong> Aprobado ✔️</span>
        </div>

        <table class="ticket-table">
            <thead>
                <tr>
                    <th>Material</th>
                    <th style="text-align: right !important;">Total</th>
                </tr>
            </thead>
            <tbody id="tabla-cuerpo-ticket">
                </tbody>
        </table>

        <div class="ticket-total">
            Total Pago: <span id="total-monto-ticket">$0.00</span>
        </div>

        <div class="ticket-actions">
            <button onclick="window.print()" class="btn-print">🖨️ Imprimir / PDF</button>
            <button onclick="vaciarYRegresar()" class="btn-return">Ir al Inicio</button>
        </div>
    </div>

    <script src="sistema-logica.js"></script>
</body>
</html>
