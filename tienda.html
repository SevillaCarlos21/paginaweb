<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tienda - ConstruGlobal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: sans-serif; }
        .header-bg { background: #1e293b; border-bottom: 2px solid #3b82f6; }
        
        /* Estilos recuperados para tus tarjetas */
        .grid-productos { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; padding: 20px 0; }
        .card-producto { background: #1e293b; padding: 15px; border-radius: 8px; border: 1px solid #334155; text-align: left; }
        .card-producto img { width: 100%; height: 180px; object-fit: cover; margin-bottom: 10px; border-radius: 4px; background: white; }
        .card-producto h3 { font-size: 1.1rem; font-weight: bold; color: white; margin: 5px 0; }
        .card-producto .precio { font-weight: bold; color: #ffffff; font-size: 1.2rem; margin: 5px 0; }
        .btn-add { background: #d97706; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; }
        .btn-add:hover { background: #b45309; }
        .contenedor-buscador{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin:20px 0;
}

.contenedor-buscador input{
    width:700px;
    padding:12px;
    border:2px solid #d97706;
    border-radius:10px;
    background:#ffffff;
    color:rgb(5, 0, 0);
    font-size:20px;
}

.contenedor-buscador input:focus{
    outline:none;
    box-shadow:0 0 10px #d97706;
}

.btn-buscar{
    background:#d97706;
    color:white;
    border:none;
    padding:15px 20px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.btn-buscar:hover{
    background:#b45309;
}
        

    </style>
</head>
<body>

    <header class="header-bg p-4 flex justify-between items-center sticky top-0 z-50 shadow-lg">
        <span class="text-2xl font-black text-white">CONSTRU<span class="text-amber-500">GLOBAL</span></span>
        <div class="flex items-center space-x-6">
            <a id="btn-admin" href="admin.html" class="hidden bg-red-900/50 text-red-300 px-4 py-2 rounded-lg font-bold border border-red-800">Panel Admin</a>
            <a href="carrito.html" class="text-white font-bold flex items-center gap-2">
                <i data-lucide="shopping-cart" class="w-5 h-5"></i> 
                Mi Pedido <span id="cart-count" class="bg-amber-600 text-xs px-2 py-0.5 rounded-full text-white">0</span>
            </a>
            <div class="flex items-center space-x-2 bg-slate-800 px-3 py-1 rounded-full border border-slate-700">
                <div class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></div>
                <span id="nombre-usuario" class="font-bold text-white text-sm">...</span>
                <button onclick="cerrarSesion()" class="text-slate-400 hover:text-white ml-2"><i data-lucide="log-out" class="w-4 h-4"></i></button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-8">
        <h1 class="text-3xl font-black text-white mb-6">Catálogo Oficial de Materiales</h1>
        <div class="contenedor-buscador">
            <input
            type="text"
            id="input-buscar"
            placeholder="🔍 Buscar material..."
            onkeyup="filtrarMateriales()">
            <button class="btn-buscar">
                Buscar
            </button>
        </div>
        <div class="filtros-categoria" style="display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap;">
            <button onclick="filtrarPorCategoria('Todos')" class="btn-cat">Todos</button>
            <button onclick="filtrarPorCategoria('Construcción')" class="btn-cat">Construcción</button>
            <button onclick="filtrarPorCategoria('Acabados')" class="btn-cat">Acabados</button>
            <button onclick="filtrarPorCategoria('Herramientas')" class="btn-cat">Herramientas</button>
            <button onclick="filtrarPorCategoria('Instalaciones')" class="btn-cat">Instalaciones</button>
            <button onclick="filtrarPorCategoria('Ferretería')" class="btn-cat">Ferretería</button>
            <button onclick="filtrarPorCategoria('Accesorios')" class="btn-cat">Accesorios</button>
        </div>

<style>
    .btn-cat { background: #334155; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
    .btn-cat:hover { background: #d97706; }
</style>

        <div id="grid-productos" class="grid-productos"></div>

        
    </main>

    <script src="sistema-logica.js"></script>
    <script>
        lucide.createIcons();
        window.onload = function() {
            const usuarioStr = localStorage.getItem("usuario_logeado");
            if (!usuarioStr) { window.location.href = "index.html"; return; }
            const usuario = JSON.parse(usuarioStr);
            document.getElementById("nombre-usuario").innerText = usuario.nombre;
            if (usuario.rol === "admin") document.getElementById("btn-admin").classList.remove("hidden");
            
            renderizarCatalogo(materiales);
            actualizarContadorCarritoVisual();
        };
        function cerrarSesion() { localStorage.removeItem("usuario_logeado"); window.location.href = "index.html"; }
    </script>



</body>
</html>
